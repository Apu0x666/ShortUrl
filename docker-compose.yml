services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/app
    volumes:
      - ./:/var/www/app
      - symfony_var:/var/www/app/var
    env_file:
      - .env
    environment:
      APP_DEBUG: "0"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/app
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M -vv
    volumes:
      - ./:/var/www/app
      - symfony_var:/var/www/app/var
    env_file:
      - .env
    environment:
      APP_DEBUG: "0"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shorturl
      POSTGRES_USER: shorturl
      POSTGRES_PASSWORD: shorturl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shorturl -d shorturl" ]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 20

  loadtest:
    build:
      context: .
      dockerfile: Dockerfile.loadtest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      BASE_URL: http://nginx
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shorturl
      DB_USER: shorturl
      DB_PASSWORD: shorturl
    depends_on:
      db:
        condition: service_healthy
      nginx:
        condition: service_started

volumes:
  postgres_data:
  symfony_var:
